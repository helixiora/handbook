<article class="doc-card">
  <div class="doc-card-meta">
    <span>{{ .Params.kicker | default "Handbook" }}</span>
    <span>{{ .ReadingTime }} min read</span>
  </div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p>{{ .Params.lead | default .Summary }}</p>
  <a class="doc-card-link" href="{{ .RelPermalink }}" aria-label="Read {{ .Title }}">Read page</a>
</article>

{{ define "main" }}
  <section class="page-hero slim">
    <div class="container article-hero">
      <p class="eyebrow">Not found</p>
      <h1>This page slipped out of the signal path</h1>
      <p class="page-lead">The URL does not resolve to a published page. Use the handbook index to get back to the current public surface.</p>
      {{ with site.GetPage "/docs" }}
        <a class="button button-primary" href="{{ .RelPermalink }}">Open the handbook</a>
      {{ end }}
    </div>
  </section>
{{ end }}
